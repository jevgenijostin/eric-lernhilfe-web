<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Schach-Trainer für Eric</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Schach">
<meta name="theme-color" content="#1d2330">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<style>
:root{
  --light:#eef1d6; --dark:#7a9b56; --sel:#f6f56e; --dot:rgba(40,80,30,.45);
  --capt:#d94f4f; --check:#e25b5b; --last:#f6e98a;
  --bg:#1d2330; --panel:#27304a; --ink:#f3f5fb; --muted:#aab2c8; --accent:#f6a93b;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(160deg,#1d2330,#2a3350);color:var(--ink);
  font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:16px 14px 40px}
h1{font-size:22px;margin:4px 0 2px;display:flex;align-items:center;gap:8px}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:14px}

.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
.controls button,.controls select{
  background:var(--panel);color:var(--ink);border:1px solid #3a4566;
  border-radius:11px;padding:9px 13px;font-size:15px;cursor:pointer;font-weight:600}
.controls button:hover{border-color:var(--accent)}
.controls .tip{background:var(--accent);color:#222;border-color:var(--accent)}
.controls label{color:var(--muted);font-size:13px}

.status{background:var(--panel);border:1px solid #3a4566;border-radius:14px;
  padding:12px 14px;margin-bottom:12px;min-height:48px;font-size:16px;line-height:1.4}
.status .big{font-size:17px;font-weight:700}
.status.good{border-color:#4caf50}
.status.warn{border-color:var(--check)}
.status.tip{border-color:var(--accent)}

.boardwrap{display:flex;justify-content:center}
.board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);
  width:min(92vw,460px);max-width:100%;aspect-ratio:1/1;border:5px solid #3a4566;border-radius:10px;
  overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.4);touch-action:manipulation}
.sq{position:relative;display:flex;align-items:center;justify-content:center;min-width:0;min-height:0;
  overflow:hidden;font-size:min(9.5vw,52px);line-height:1;cursor:pointer;user-select:none}
.sq.light{background:var(--light)} .sq.dark{background:var(--dark)}
.sq.sel{background:var(--sel)!important}
.sq.last{box-shadow:inset 0 0 0 4px var(--last)}
.sq.check{background:var(--check)!important}
.piece{filter:drop-shadow(0 1px 1px rgba(0,0,0,.35))}
.piece.w{color:#fff;text-shadow:0 0 2px #000,0 0 2px #000,1px 1px 0 #444}
.piece.b{color:#1c1c1c;text-shadow:0 0 1px #000}
.dot{position:absolute;width:30%;height:30%;border-radius:50%;background:var(--dot)}
.dot.capt{width:86%;height:86%;background:transparent;border:5px solid var(--capt);
  border-radius:50%;box-sizing:border-box}
.coord{position:absolute;font-size:10px;color:rgba(0,0,0,.4);font-weight:700}
.coord.file{bottom:1px;right:3px} .coord.rank{top:1px;left:3px}

.trays{display:flex;justify-content:space-between;margin-top:10px;gap:10px}
.tray{flex:1;background:var(--panel);border:1px solid #3a4566;border-radius:12px;
  padding:6px 10px;min-height:40px;font-size:24px;line-height:1}
.tray .lbl{font-size:11px;color:var(--muted);display:block;margin-bottom:2px}
.tray .adv{font-size:13px;color:var(--accent);font-weight:700}

.hintmove{font-weight:700;color:var(--accent)}
.footer{color:var(--muted);font-size:11px;text-align:center;margin-top:18px}

</style>
</head>
<body>
<div class="wrap">
  <h1>♟️ Schach-Trainer</h1>
  <div class="subtitle">Spiel gegen den Computer und lerne dabei mit Tipps und Erklärungen.</div>

  <div class="controls">
    <label for="level">Stärke:</label>
    <select id="level">
      <option value="0">Anfänger</option>
      <option value="1" selected>Leicht</option>
      <option value="2">Mittel</option>
    </select>
    <button id="tip" class="tip">Tipp 💡</button>
    <button id="undo">Zurück ↩️</button>
    <button id="newGame">Neues Spiel 🔄</button>
  </div>

  <div id="status" class="status"></div>

  <div class="boardwrap"><div id="board" class="board"></div></div>

  <div class="trays">
    <div class="tray" id="trayW"></div>
    <div class="tray" id="trayB"></div>
  </div>

  <div class="footer">Für Eric ❤️ · läuft offline im Browser</div>
</div>

      if (m.captured) return `Du schlägst ${DE_AKK[m.captured]} und gibst gleichzeitig Schach! ♟️👑`;

    }
    if (m.captured) {

      if (p.type === "n") return "Der Springer zieht im „L“ 🐴 (zwei Felder gerade, eins zur Seite). So passt es nicht.";
      return `So zieht der ${piece} nicht dorthin. 🤔 Schau dir die grünen Punkte an — das sind die erlaubten Felder.`;
    }
    // pattern is fine but move is illegal -> it would leave the king in check
    if (game.in_check())
      return "Dein König steht im Schach! 🛡️ Du musst zuerst den König retten (wegziehen, blocken oder den Angreifer schlagen).";
    return "Wenn du so ziehst, steht dein eigener König im Schach. 🛡️ Die Figur ist „gefesselt“ — sie deckt den König.";
  }

  global.ChessEngine = { evaluate, computerMove, bestMove, explainMove, explainIllegal,
                         DE, DE_AKK, VAL, idx };
})(window);

/* UI: board rendering + interaction, highlights, hint button, illegal-move teaching,
   computer opponent, captured tray. German UI; the human plays White (bottom). */
(function () {
  "use strict";
  // U+FE0E = text-presentation selector: forces monochrome TEXT glyphs so CSS color()
  // applies. Without it, iOS renders the pawn (♟) as a colored emoji that ignores the
  // white fill, making white pawns look dark/different from the other pieces.
  const VS = String.fromCharCode(0xFE0E);  // text-presentation selector (U+FE0E)
  const BASE = { k:"♚", q:"♛", r:"♜", b:"♝", n:"♞", p:"♟" };
  const GLYPH = {};
  for (const color of ["w", "b"]) for (const t in BASE) GLYPH[color + t] = BASE[t] + VS;
  const FILES = "abcdefgh";
  const E = window.ChessEngine;

  let game = new Chess();
  let selected = null;        // square e.g. "e2"
  let legalForSel = [];       // verbose legal moves from selected
  let level = 1;
  let lastMove = null;        // {from,to}
  let busy = false;           // computer thinking / animating
  let hintMove = null;

  const boardEl = document.getElementById("board");
  const statusEl = document.getElementById("status");
  const trayW = document.getElementById("trayW");
  const trayB = document.getElementById("trayB");

  function setStatus(html, cls) {
    statusEl.className = "status" + (cls ? " " + cls : "");
    statusEl.innerHTML = html;
  }

  function squareName(r, c) { return FILES[c] + (8 - r); } // r,c are render rows (0=top=rank8)

  function render() {
    const b = game.board();
    boardEl.innerHTML = "";
    const checkSq = inCheckSquare();
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
      const sq = squareName(r, c);
      const cell = document.createElement("div");
      cell.className = "sq " + ((r + c) % 2 === 0 ? "light" : "dark");
      cell.dataset.square = sq;
      if (selected === sq) cell.classList.add("sel");
      if (lastMove && (lastMove.from === sq || lastMove.to === sq)) cell.classList.add("last");
      if (checkSq === sq) cell.classList.add("check");
      const p = b[r][c];
      if (p) {
        const span = document.createElement("span");
        span.className = "piece " + p.color;
        span.textContent = GLYPH[p.color + p.type];
        cell.appendChild(span);
      }
      // legal-move dots when a piece is selected
      const lm = legalForSel.find(m => m.to === sq);
      if (lm) {
        const dot = document.createElement("span");
        dot.className = "dot" + (lm.captured || lm.flags.includes("e") ? " capt" : "");
        cell.appendChild(dot);
      }
      // coordinates on edges
      if (c === 0) { const cr = document.createElement("span"); cr.className = "coord rank"; cr.textContent = 8 - r; cell.appendChild(cr); }
      if (r === 7) { const cf = document.createElement("span"); cf.className = "coord file"; cf.textContent = FILES[c]; cell.appendChild(cf); }
      cell.addEventListener("click", () => onSquareClick(sq));
      boardEl.appendChild(cell);
    }
    renderTrays();
  }

  function inCheckSquare() {
    if (!game.in_check()) return null;
    const turn = game.turn();
    const b = game.board();
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
      const p = b[r][c];
      if (p && p.type === "k" && p.color === turn) return squareName(r, c);
    }
    return null;
  }

  function renderTrays() {
    // captured = starting pieces minus current, per color
    const start = { p:8,n:2,b:2,r:2,q:1 };
    const cur = { w:{p:0,n:0,b:0,r:0,q:0}, b:{p:0,n:0,b:0,r:0,q:0} };
    game.board().forEach(row => row.forEach(p => { if (p && p.type !== "k") cur[p.color][p.type]++; }));
    const glyphsCapturedBy = (myColor, oppColor) => {
      let s = "", pts = 0;
      ["q","r","b","n","p"].forEach(t => {
        const n = start[t] - cur[oppColor][t];
        for (let i = 0; i < n; i++) { s += GLYPH[oppColor + t]; pts += E.VAL[t]; }
      });
      return { s, pts };
    };
    const w = glyphsCapturedBy("w", "b");   // black pieces white captured
    const bl = glyphsCapturedBy("b", "w");
    const diff = Math.round((w.pts - bl.pts) / 100);
    trayW.innerHTML = `<span class="lbl">Du (Weiß) hast geschlagen</span><span class="b">${w.s||"—"}</span>` +
      (diff > 0 ? ` <span class="adv">+${diff}</span>` : "");
    trayB.innerHTML = `<span class="lbl">Computer (Schwarz) hat geschlagen</span><span class="w">${bl.s||"—"}</span>` +
      (diff < 0 ? ` <span class="adv">+${-diff}</span>` : "");
  }

  function onSquareClick(sq) {
    if (busy || game.game_over()) return;
    if (game.turn() !== "w") return;            // wait for your turn
    hintMove = null;
    const piece = game.get(sq);
    if (selected) {
      if (sq === selected) { clearSel(); render(); return; }
      const legal = legalForSel.find(m => m.to === sq);
      if (legal) { doHumanMove(legal); return; }
      // clicked another own piece -> reselect
      if (piece && piece.color === "w") { selectSquare(sq); render(); return; }
      // illegal target -> explain why (the teaching moment)
      setStatus("🚫 " + E.explainIllegal(game, selected, sq), "warn");
      return;
    }
    if (piece && piece.color === "w") { selectSquare(sq); render(); }
  }

  function selectSquare(sq) {
    selected = sq;
    legalForSel = game.moves({ square: sq, verbose: true });
    if (!legalForSel.length) setStatus("Diese Figur kann gerade nicht ziehen. 🤔 Wähle eine andere.", "warn");
  }
  function clearSel() { selected = null; legalForSel = []; }

  // verbose move text for a kid: "Bauer E2 → E4" (+ "schlägt die Dame" on a capture)
  function moveStr(m) {
    let s = E.DE[m.piece] + " " + m.from.toUpperCase() + " → " + m.to.toUpperCase();
    if (m.captured) s += " (schlägt " + E.DE_AKK[m.captured] + ")";
    return s;
  }

  function doHumanMove(move) {
    // auto-queen promotion for simplicity
    const opts = { from: move.from, to: move.to };
    if (move.flags.includes("p")) opts.promotion = "q";
    const m = game.move(opts);
    lastMove = { from: m.from, to: m.to };
    clearSel();
    render();
    if (announceEnd()) return;
    busy = true;
    setStatus(`Du zogst: <b>${moveStr(m)}</b>. Der Computer überlegt… 🤖`, "");
    setTimeout(computerTurn, 350);
  }

  function computerTurn() {
    const m = E.computerMove(game, level);
    if (m) {
      const mv = game.move(m);
      lastMove = { from: mv.from, to: mv.to };
      render();
      if (announceEnd()) { busy = false; return; }
      if (game.in_check()) setStatus(`Schach! 👑 Der Computer zog <b>${moveStr(mv)}</b> und greift deinen König an!`, "warn");
      else setStatus(`Der Computer zog: <b>${moveStr(mv)}</b>. Du bist dran! ♟️`, "");
    }
    busy = false;
  }

  function announceEnd() {
    if (game.in_checkmate()) {
      const youWon = game.turn() === "b";
      setStatus(youWon ? "🏆 <span class='big'>Schachmatt! Du hast gewonnen! Super gespielt!</span>"
                       : "😅 <span class='big'>Schachmatt. Der Computer gewinnt. Neues Spiel?</span>",
                youWon ? "good" : "warn");
      return true;
    }
    if (game.in_stalemate()) { setStatus("Patt! 🤝 Unentschieden. Der König kann nicht ziehen, steht aber nicht im Schach.", "tip"); return true; }
    if (game.in_draw()) { setStatus("Remis 🤝 Unentschieden.", "tip"); return true; }
    return false;
  }

  // --- Hint ---
  function showHint() {
    if (busy || game.game_over() || game.turn() !== "w") return;
    const m = E.bestMove(game);
    if (!m) return;
    hintMove = m;
    selectSquare(m.from);
    // re-mark only the hinted target strongly by keeping selection highlight + dots
    render();
    const fromCell = boardEl.querySelector(`[data-square="${m.from}"]`);
    const toCell = boardEl.querySelector(`[data-square="${m.to}"]`);
    if (fromCell) fromCell.classList.add("sel");
    if (toCell) toCell.classList.add("sel");
    setStatus(`💡 <b>Tipp:</b> Ziehe <span class="hintmove">${E.DE[m.piece]} ${m.from.toUpperCase()} → ${m.to.toUpperCase()}</span>. ` +
              E.explainMove(game, m), "tip");
  }

  // --- Controls ---
  document.getElementById("newGame").addEventListener("click", () => {
    game = new Chess(); clearSel(); lastMove = null; hintMove = null; busy = false;
    setStatus("Neues Spiel! Du bist Weiß und ziehst zuerst. Viel Erfolg! ♟️", "good");
    render();
  });
  document.getElementById("undo").addEventListener("click", () => {
    if (busy) return;
    game.undo(); game.undo();   // undo computer + your move
    clearSel(); hintMove = null;
    lastMove = null;
    setStatus("Zug zurückgenommen. Versuch's nochmal! ↩️", "");
    render();
  });
  document.getElementById("tip").addEventListener("click", showHint);
  document.getElementById("level").addEventListener("change", e => {
    level = +e.target.value;
  });

  setStatus("Willkommen, Eric! 👋 Du spielst mit den <b>weißen</b> Figuren und ziehst zuerst. " +
            "Tipp auf eine Figur — die grünen Punkte zeigen, wohin sie darf. Brauchst du Hilfe? Drück <b>Tipp 💡</b>.", "good");
  render();
})();

</script>
</body>
</html>
